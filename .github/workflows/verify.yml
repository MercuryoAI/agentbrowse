name: Verify

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Check types
        run: npm run check-types

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Verify packed artifact
        run: npm run pack:verify

      - name: Smoke test packed install
        run: npm run smoke:pack-install
